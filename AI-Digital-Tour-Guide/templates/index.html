<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵山胜境 AI 数字人导游</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --gold: #D4A843;
            --deep: #2D1F0E;
            --light: #FFF8F0;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fef9f0 0%, #fdf5e6 50%, #fff8f0 100%);
            min-height: 100vh;
        }
        /* Live2D 容器 */
        #avatar-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(212,168,67,0.15) 0%, transparent 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #avatar-container canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        #avatar-placeholder {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(212,168,67,0.3) 0%, rgba(212,168,67,0.1) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            animation: breathe 3s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        /* 聊天区域 */
        #chat-messages {
            scroll-behavior: smooth;
        }
        #chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        #chat-messages::-webkit-scrollbar-thumb {
            background: rgba(212,168,67,0.3);
            border-radius: 2px;
        }
        .msg-bot {
            background: linear-gradient(135deg, rgba(255,248,240,0.95), rgba(255,240,225,0.95));
            border-radius: 16px 16px 16px 4px;
        }
        .msg-user {
            background: linear-gradient(135deg, rgba(212,168,67,0.9), rgba(180,140,50,0.9));
            border-radius: 16px 16px 4px 16px;
            color: white;
        }
        /* 思考动画 */
        .thinking-dot {
            animation: pulse-dot 1.4s ease-in-out infinite;
        }
        .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
        /* 快捷按钮 */
        .quick-btn {
            transition: all 0.2s;
        }
        .quick-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212,168,67,0.3);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-2 md:p-4">

    <!-- 主容器 -->
    <div class="w-full max-w-6xl h-[98vh] md:h-[95vh] flex flex-col md:flex-row rounded-2xl overflow-hidden shadow-2xl bg-white border border-amber-100">

        <!-- ═══ 左侧：数字人展示区 ═══ -->
        <div class="w-full md:w-5/12 h-[35vh] md:h-full relative border-b md:border-b-0 md:border-r border-gray-100 bg-gradient-to-b from-amber-50 to-white">
            <!-- 顶部状态栏 -->
            <div class="absolute top-0 left-0 right-0 z-10 flex items-center justify-between p-3">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-green-400 animate-pulse"></div>
                    <span class="text-gray-700 text-sm font-medium">小灵在线</span>
                </div>
                <div id="status-text" class="text-gray-400 text-xs">等待中...</div>
            </div>

            <!-- Live2D 容器 -->
            <div id="avatar-container">
                <!-- <div id="avatar-placeholder">🧘</div> -->
            </div>

            <!-- 底部名称 -->
            <div class="absolute bottom-3 left-0 right-0 text-center">
                <h2 class="text-gray-800 text-lg font-bold tracking-wider">灵山 AI 导游 · 小灵</h2>
                <p class="text-gray-400 text-xs mt-0.5">24小时在线 · 有问必答</p>
            </div>
        </div>

        <!-- ═══ 右侧：对话区 ═══ -->
        <div class="w-full md:w-7/12 h-[65vh] md:h-full flex flex-col bg-gray-50/50">
            <!-- 头部 -->
            <div class="flex items-center gap-3 px-4 py-3 border-b border-gray-100 bg-white">
                <span class="text-2xl">🏯</span>
                <div>
                    <h3 class="text-gray-800 font-semibold text-sm">灵山胜境 · 智能导览</h3>
                    <!-- <p class="text-gray-400 text-xs">基于灵山胜境官方资料库 | 回答准确率 ≥ 90%</p> -->
                </div>
            </div>

            <!-- 消息列表 -->
            <div id="chat-messages" class="flex-1 overflow-y-auto px-4 py-3 space-y-3">
                <!-- 欢迎消息 -->
                <div class="flex gap-2">
                    <div class="w-8 h-8 rounded-full bg-amber-500/20 flex items-center justify-center text-sm shrink-0">🧘</div>
                    <div class="msg-bot px-3 py-2 max-w-[85%] text-sm text-gray-800 shadow-sm" id="welcome-msg">
                        <p class="leading-relaxed"></p>
                    </div>
                </div>
            </div>

            <!-- 快捷按钮 -->
            <div class="px-4 py-2 flex gap-2 overflow-x-auto">
                <button onclick="quickAsk('喜欢历史')" class="quick-btn shrink-0 px-3 py-1.5 bg-amber-50 hover:bg-amber-100 text-amber-700 rounded-full text-xs whitespace-nowrap border border-amber-200 transition-all">
                    🏛️ 喜欢历史
                </button>
                <button onclick="quickAsk('喜欢自然')" class="quick-btn shrink-0 px-3 py-1.5 bg-green-50 hover:bg-green-100 text-green-700 rounded-full text-xs whitespace-nowrap border border-green-200 transition-all">
                    🌿 喜欢自然
                </button>
                <button onclick="quickAsk('亲子出游')" class="quick-btn shrink-0 px-3 py-1.5 bg-pink-50 hover:bg-pink-100 text-pink-700 rounded-full text-xs whitespace-nowrap border border-pink-200 transition-all">
                    👨‍👩‍👧 亲子出游
                </button>
                <button onclick="quickAsk('推荐美食')" class="quick-btn shrink-0 px-3 py-1.5 bg-orange-50 hover:bg-orange-100 text-orange-700 rounded-full text-xs whitespace-nowrap border border-orange-200 transition-all">
                    🍜 推荐美食
                </button>
            </div>

            <!-- 输入区 -->
            <div class="px-4 py-3 border-t border-gray-100 bg-white">
                <div class="flex items-center gap-2">
                    <!-- 语音按钮 -->
                    <button id="voice-btn" onclick="toggleVoice()"
                            class="w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-500 flex items-center justify-center shrink-0 transition-all"
                            title="语音输入">
                        <svg id="mic-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H9m3 0h3m-3-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                        </svg>
                    </button>

                    <!-- 文本输入 -->
                    <input id="message-input" type="text" placeholder="问我关于灵山的问题..."
                           class="flex-1 bg-gray-50 text-gray-800 placeholder-gray-400 px-4 py-2.5 rounded-xl border border-gray-200 focus:border-amber-400 focus:outline-none text-sm"
                           onkeydown="if(event.key==='Enter')sendMessage()">

                    <!-- 发送按钮 -->
                    <button onclick="sendMessage()"
                            class="w-10 h-10 rounded-full bg-amber-500 hover:bg-amber-400 text-white flex items-center justify-center shrink-0 transition-all shadow-lg shadow-amber-500/20"
                            title="发送">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                    </button>
                </div>
                <p id="voice-status" class="text-gray-400 text-xs mt-1.5 text-center hidden"></p>
            </div>
        </div>
    </div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
