services:
  - type: web
    name: lingshan-ai-guide
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lingshan-db
          property: connectionString
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: ADMIN_SECRET_KEY
        sync: false

databases:
  - name: lingshan-db
    plan: free
